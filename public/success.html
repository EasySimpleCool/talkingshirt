<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkingSh*rt — Order confirmed</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --theme-fg: #424242;
        --theme-fg-alt: #808080;
        --theme-bg: #ffffff;
        --theme-faint-alt: #e0e0e0;

        --comp-container-max-w: 800px;
        --comp-section-md-h-pad: 24px;
        --comp-section-md-height: 80px;
        --comp-section-lg-h-pad: 24px;
        --comp-section-lg-v-pad: 40px;
        --comp-stack-sm: 16px;
      }

      .type-medium {
        font-weight: 700;
        font-size: 24px;
        line-height: 1;
        letter-spacing: 0;
      }

      .type-small {
        font-weight: 700;
        font-size: 12px;
        line-height: 1;
        letter-spacing: 0;
      }

      [data-section="md"] {
        display: flex;
        align-items: center;
        height: var(--comp-section-md-height);
        padding: 0 var(--comp-section-md-h-pad);
      }

      [data-section="lg"] {
        padding: var(--comp-section-lg-v-pad) var(--comp-section-lg-h-pad);
      }

      [data-container] {
        width: 100%;
        max-width: var(--comp-container-max-w);
        margin-inline: auto;
        position: relative;
      }

      [data-stack] {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }

      [data-gap="sm"] {
        gap: var(--comp-stack-sm);
      }

      html,
      body {
        background: white;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--theme-fg);
      }

      .top-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1100;
        background: rgba(255, 255, 255, 0.95);
        border-bottom: 1px solid var(--theme-faint-alt);
      }

      main {
        padding-top: var(--comp-section-md-height);
      }

      .success-body {
        color: var(--theme-fg);
      }

      .success-label {
        color: var(--theme-fg-alt);
      }

      .home-link {
        color: var(--theme-fg);
        text-decoration: underline;
        text-decoration-color: var(--theme-faint-alt);
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="top-nav" data-section="md" role="banner">
      <div data-container>
        <div class="type-medium">TalkingSh*rt</div>
      </div>
    </div>

    <main>
      <section data-section="lg">
        <div data-container>
          <div data-stack data-gap="sm">
            <span class="success-label type-small">Order confirmed</span>
            <p class="success-body type-medium">
              Thanks for ordering. Your sh*rt is on its way.
            </p>
            <p class="success-label type-small">
              You'll get a receipt by email. Any questions — just reply to it.
            </p>
            <a class="home-link type-medium" href="/">Back home</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
