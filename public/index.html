  <body>

    <div
      class="about-panel about-panel--overlay"
      id="aboutPanel"
      data-section="lg"
      role="region"
      aria-label="About"
      aria-hidden="true"
    >
      <div data-container>
        <div data-stack data-gap="lg">

            <div class="post-head" data-row data-justify="between">

          <div class="post" data-stack>

          <div class="post" data-stack>
            <div class="post-head" data-row data-justify="between">
              <span class="post-label type-small">Contact</span>
              <time class="post-date type-small" datetime="2026-04-02">
                2/04/26

            </div>

              For any custom stuff. Hit us at hello@talkingshirt.co

    </div>

    <script>
      const scrollContainer = document.querySelector(".scroll-container");
      const animatedText = document.getElementById("animatedText");
      const scrollArrow = document.getElementById("scrollArrow");
      const tshirtContainer = document.getElementById("tshirtContainer");
      const chestText = document.getElementById("chestText");
      const chestTextContainer = document.querySelector(
        ".chest-text-container",
      );
      const footer = document.querySelector(".footer-drawer");
      const addToCartBtn = document.getElementById("addToCart");
      const sizeSelect = document.getElementById("sizeSelect");
      const sizeSelectText = document.getElementById("sizeSelectText");
      const navBtn = document.getElementById("navBtn");
      const aboutPanel = document.getElementById("aboutPanel");

      const FULL_TEXT = "Talk some sh*rt";

      // Scroll phase boundaries (monotonically increasing, end at 1).
      // P.idle = 0: idle state only shows at exactly scrollY === 0 (so the
      // user sees the cursor + arrow on page load); any scroll at all kicks
      // straight into the typing animation.
      const P = {
        idle: 0, // cursor + arrow (only at scroll = 0)
        type: 0.28, // type "Talk some sh*rt"
        pause: 0.34, // hold full headline
        delete: 0.85, // delete FULL_TEXT → "" while shirt rises + cursor shrinks + recolors
        edit: 1.0, // editable — same cursor stays put, input mirrors into headline
      };

      // Within the delete phase, when does the cursor recolor black→white?
      // (normalized 0..1 within that phase). Tuned so the flip lands right
      // when the rising shirt body covers the cursor's location.
      const COLOR_FLIP_START = 0.3;
      const COLOR_FLIP_END = 0.55;

      // Headline colors are resolved from CSS custom properties so the design
      // tokens (--theme-fg, --theme-bg) are the single source of truth. The
      // delete-phase interpolation needs per-channel math, so we parse each
      // token into a tuple once at init and keep a CSS string alongside for
      // the static phases.
      function parseCssColorToRgb(cssColor) {
        // Minimal parser for the two shapes we actually put in tokens: `#rgb`,
        // `#rrggbb`, and `rgb(r, g, b)` / `rgba(r, g, b, a)`. Anything else
        // would indicate someone dropped a non-token value in a :root var.
        const hex = cssColor.trim().match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
        if (hex) {
          const h =
            hex[1].length === 3
              ? hex[1]
                  .split("")
                  .map((c) => c + c)
                  .join("")
              : hex[1];
          return [
            parseInt(h.slice(0, 2), 16),
            parseInt(h.slice(2, 4), 16),
            parseInt(h.slice(4, 6), 16),
          ];
        }
        const rgb = cssColor.match(/(\d+(?:\.\d+)?)/g);
        if (rgb && rgb.length >= 3) {
          return [Number(rgb[0]), Number(rgb[1]), Number(rgb[2])];
        }
        throw new Error(`Unsupported CSS color in token: "${cssColor}"`);
      }
      function readToken(name) {
        return getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();
      }
      const FG_DARK_RGB = parseCssColorToRgb(readToken("--theme-fg"));
      const FG_DARK_CSS = `rgb(${FG_DARK_RGB.join(", ")})`;
      const BG_LIGHT_RGB = parseCssColorToRgb(readToken("--theme-bg"));
      const BG_LIGHT_CSS = `rgb(${BG_LIGHT_RGB.join(", ")})`;

      // Ease-out so the shirt rises FAST at the start of deletion and is
      // essentially in place by the time only "Talk" is left.
      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function clamp(v, min, max) {
        return Math.min(Math.max(v, min), max);
      }

      // Render `text` with the fake cursor inserted at `caretPos`. If
      // caretPos is omitted/invalid, the cursor renders at the end (typing-
      // animation behavior). This lets the headline mirror the input's
      // actual selectionStart so arrow keys / clicks reposition the visible
      // cursor between letters.
      function setHeadline(text, caretPos) {
        let pos = caretPos;
        if (pos == null || pos < 0 || pos > text.length) {
          pos = text.length;
        }
        const before = text.slice(0, pos);
        const after = text.slice(pos);
        animatedText.innerHTML =
          before + '<span class="cursor"></span>' + after;
      }

      // Mirror the chest input's value AND caret position into the headline.
      function syncHeadlineFromInput() {
        setHeadline(chestText.value, chestText.selectionStart);
      }

      function setHeadlineOpacity(value) {
        animatedText.style.opacity = String(value);
      }

      function setShirtRise(riseVh) {
        // riseVh: 100 = fully below viewport, 0 = chest at viewport center
        tshirtContainer.style.transform = `translate(-50%, calc(-1 * var(--layout-chest-y) + ${riseVh}vh))`;
      }

      function setShirtOpacity(value) {
        tshirtContainer.style.opacity = String(value);
      }

      // Combined transform setter so scale + horizontal offset never fight.
      // xOffsetPx shifts the headline horizontally from viewport center, used
      // to align the cursor with the actual chest-text position on the shirt
      // (which can deviate from viewport center via --chest-x).
      function setHeadlineTransform(scale, xOffsetPx) {
        const x = xOffsetPx || 0;
        animatedText.style.transform = `translate(calc(-50% + ${x}px), -50%) scale(${scale})`;
      }

      function setHeadlineColor(color) {
        animatedText.style.color = color;
      }

      // Drives only the cursor's fill (independent from the headline color).
      // Pass null to fall back to currentColor (default during typing phases).
      function setCursorBg(color) {
        if (color) {
          animatedText.style.setProperty("--cursor-bg", color);
        } else {
          animatedText.style.removeProperty("--cursor-bg");
        }
      }

      // Measure the *resolved* font sizes off real elements. Reading the
      // CSS custom property directly returns the literal "clamp(...)" string,
      // which parseFloat can't handle — so we measure from .animated-text
      // (font-size: var(--copy-size)) and .chest-text (font-size: var(--chest-font)).
      function getFinalScale() {
        const copyPx = parseFloat(getComputedStyle(animatedText).fontSize);
        const chestPx = parseFloat(getComputedStyle(chestText).fontSize);
        if (!copyPx || !chestPx) return 0.25;
        return chestPx / copyPx;
      }

      // Where (in px from viewport center) does the chest print sit?
      // Always derived from the actual chest-text-container so the cursor
      // and the input can never visually disagree, no matter how --chest-x
      // is tuned or how the shirt scales.
      function getChestOffsetX() {
        const rect = chestTextContainer.getBoundingClientRect();
        return rect.left + rect.width / 2 - window.innerWidth / 2;
      }

      function handleScroll() {
        // While About is open, scroll is locked and the product chrome is
        // slid off-screen — skip recalculation so e.g. a resize doesn't
        // re-focus the chest input (which would pop the mobile keyboard).
        if (document.body.classList.contains("about-open")) return;

        const scrollTop = window.scrollY;
        // clientHeight (layout viewport) is stable across iOS soft-keyboard
        // and native-picker transitions, while window.innerHeight (visual
        // viewport) shrinks/grows with them. Using innerHeight here makes
        // maxScroll jitter whenever the keyboard toggles — which on the edit
        // phase means progress bounces between 1.0 and ~0.8, replaying the
        // shirt-rise animation and visually "jumping" the page. clientHeight
        // matches the units the 300vh scroll-container is sized in, so
        // maxScroll stays constant until an actual viewport resize.
        const maxScroll =
          scrollContainer.offsetHeight - document.documentElement.clientHeight;
        const progress = clamp(scrollTop / maxScroll, 0, 1);

        // 1. Idle — cursor + bouncing arrow (only at scroll = 0)
        if (progress <= P.idle) {
          setHeadline("");
          setHeadlineOpacity(1);
          setHeadlineTransform(1, 0);
          setHeadlineColor(FG_DARK_CSS);
          setCursorBg(null);
          scrollArrow.classList.add("visible");
          setShirtRise(100);
          setShirtOpacity(0);
          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        scrollArrow.classList.remove("visible");

        // 2. Type — type out FULL_TEXT
        if (progress < P.type) {
          const t = (progress - P.idle) / (P.type - P.idle);
          const len = Math.floor(t * (FULL_TEXT.length + 1));
          setHeadline(FULL_TEXT.slice(0, len));
          setHeadlineOpacity(1);
          setHeadlineTransform(1, 0);
          setHeadlineColor(FG_DARK_CSS);
          setCursorBg(null);
          setShirtRise(100);
          setShirtOpacity(0);
          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        // 3. Pause — hold full headline briefly
        if (progress < P.pause) {
          setHeadline(FULL_TEXT);
          setHeadlineOpacity(1);
          setHeadlineTransform(1, 0);
          setHeadlineColor(FG_DARK_CSS);
          setCursorBg(null);
          setShirtRise(100);
          setShirtOpacity(0);
          footer.classList.remove("visible");
          return;
        }

        // 4. Delete — delete the full headline while the shirt rises in
        //    parallel (ease-out so it's almost in place by the time the
        //    leading "Talk" is being deleted, fully in place when empty).
        //    The cursor shrinks to chest size and recolors black → white
        //    along the way so the same cursor element seamlessly arrives
        //    on the chest in white.
        if (progress < P.delete) {
          const t = (progress - P.pause) / (P.delete - P.pause);
          const eased = easeOutQuart(t);

          // Linear text deletion (15 chars → 0 over the phase)
          const len = Math.round(lerp(FULL_TEXT.length, 0, t));
          setHeadline(FULL_TEXT.slice(0, len));

          // Shirt rise is front-loaded via easeOutQuart, and opacity fades
          // 0 → 1 on the same curve so the shirt eases in visually too.
          setShirtRise(lerp(100, 0, eased));
          setShirtOpacity(eased);

          // Cursor scale + horizontal slide to chest position, both eased so
          // the cursor settles onto the chest exactly as the shirt arrives.
          const finalScale = getFinalScale();
          const chestX = getChestOffsetX();
          setHeadlineTransform(
            lerp(1, finalScale, eased),
            lerp(0, chestX, eased),
          );

          // Color flip — timed so it happens while the shirt body crosses
          // the cursor's vertical position. The headline color goes opaque
          // black → opaque white (so any visible text in transit stays
          // legible), while the cursor's alpha simultaneously fades toward
          // 25% so it lands on the chest at the desired final opacity.
          const dark = FG_DARK_RGB;
          const light = BG_LIGHT_RGB;
          const colorT = clamp(
            (t - COLOR_FLIP_START) / (COLOR_FLIP_END - COLOR_FLIP_START),
            0,
            1,
          );
          const c = dark.map((d, i) => Math.round(lerp(d, light[i], colorT)));
          setHeadlineColor(`rgb(${c[0]}, ${c[1]}, ${c[2]})`);
          const cursorAlpha = lerp(1, 0.5, colorT);
          setCursorBg(`rgba(${c[0]}, ${c[1]}, ${c[2]}, ${cursorAlpha})`);
          setHeadlineOpacity(1);

          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        // 5. Edit — same headline element + same .cursor stay on the chest.
        //    Typed text is full-opacity white; the cursor stays at 50% white
        //    (the "final" treatment carried over from the end of the delete
        //    phase). The input is invisible but receives keystrokes.
        setShirtRise(0);
        setShirtOpacity(1);
        setHeadlineTransform(getFinalScale(), getChestOffsetX());
        setHeadlineColor(BG_LIGHT_CSS);
        setCursorBg(
          `rgba(${BG_LIGHT_RGB[0]}, ${BG_LIGHT_RGB[1]}, ${BG_LIGHT_RGB[2]}, 0.5)`,
        );
        setHeadlineOpacity(1);
        syncHeadlineFromInput();

        chestText.classList.add("editable");
        // Focus is claimed in the `scrollend` handler below, not here. If
        // we focused on every scroll tick, iOS would pop the keyboard
        // mid-gesture and — worse — yank focus back from the size picker,
        // since iOS fires scroll events freely during picker/keyboard
        // transitions. Waiting for scrollend means the keyboard appears
        // exactly once, after the user has actually settled at the bottom.
        if (chestText.value.trim().length > 0) {
          footer.classList.add("visible");
        } else {
          footer.classList.remove("visible");
        }
      }

      chestText.addEventListener("input", () => {
        // Mirror typed text into the headline so the visible cursor stays the
        // same .cursor element from the transition (no swap to native caret).
        syncHeadlineFromInput();

        const hasText = chestText.value.trim().length > 0;
        if (hasText) {
          footer.classList.add("visible");
        } else {
          footer.classList.remove("visible");
        }
      });

      // Keep the visible cursor in sync when the user moves the caret with
      // arrow keys, clicks, Home/End, etc. `selectionchange` fires for all
      // selection/caret movement; we only act when our hidden input is the
      // active element.
      document.addEventListener("selectionchange", () => {
        if (document.activeElement === chestText) {
          syncHeadlineFromInput();
        }
      });

      // Mirror the native select's value into the visible text span whenever
      // the user picks a different size — the <select> itself is transparent
      // and invisible, so nothing would update without this.
      sizeSelect.addEventListener("change", () => {
        sizeSelectText.textContent = sizeSelect.value;
      });

      // Kick off Stripe Checkout. The secret key never touches the browser —
      // we POST the order details to our Netlify function, which creates a
      // Checkout Session server-side and hands back the hosted-page URL.
      // While orders are suspended the button is natively `disabled`, so it
      // swallows pointer events. CSS sets `pointer-events: none` on the
      // disabled button so clicks fall through to this wrapper, which routes
      // them to the About panel (where the "Orders are suspended" post lives).
      const addToCartWrap = document.getElementById("addToCartWrap");
      addToCartWrap.addEventListener("click", () => {
        if (!addToCartBtn.disabled) return;
        if (!document.body.classList.contains("about-open")) {
          navBtn.click();
        }
      });

      addToCartBtn.addEventListener("click", async () => {
        const text = chestText.value.trim();
        const size = sizeSelect.value;
        if (!text) return;

        const originalLabel = addToCartBtn.textContent;
        addToCartBtn.disabled = true;
        addToCartBtn.textContent = "Loading…";

        try {
          const res = await fetch(
            "/.netlify/functions/create-checkout-session",
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ size, text }),
            },
          );
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.url) {
            throw new Error(data.error || "Checkout failed");
          }
          window.location.assign(data.url);
        } catch (err) {
          console.error(err);
          alert("Sorry, we couldn't start checkout. Please try again.");
          addToCartBtn.disabled = false;
          addToCartBtn.textContent = originalLabel;
        }
      });

      // About panel — single persistent button toggles between product and
      // about states. CSS handles the cross-header slide + icon crossfade.
      // We lock document scroll while open so the underlying scroll-driven
      // animation can't run; scrollY is preserved at the browser level.
      navBtn.addEventListener("click", () => {
        const open = document.body.classList.toggle("about-open");
        navBtn.setAttribute("aria-label", open ? "Close about" : "About");
        navBtn.setAttribute("aria-expanded", String(open));
        aboutPanel.setAttribute("aria-hidden", String(!open));
        document.documentElement.style.overflow = open ? "hidden" : "";
        document.body.style.overflow = open ? "hidden" : "";
        // If about is open, the chest input shouldn't be holding focus —
        // blurring also dismisses the on-screen keyboard on mobile.
        if (open && document.activeElement === chestText) {
          chestText.blur();
        }
      });

      window.addEventListener("scroll", handleScroll, { passive: true });
      window.addEventListener("resize", handleScroll);

      // Focus the chest input once the user has finished scrolling into the
      // edit phase. See the edit-branch comment in handleScroll for why this
      // lives here instead of inside the scroll handler. Guards:
      //   - About panel open → chrome is hidden, don't grab focus.
      //   - Not in edit phase → nothing to type into yet.
      //   - Another interactive element owns focus (e.g. size picker,
      //     Add-to-cart button) → leave it alone.
      window.addEventListener("scrollend", () => {
        if (document.body.classList.contains("about-open")) return;
        if (!chestText.classList.contains("editable")) return;
        const active = document.activeElement;
        const ownsFocus =
          active &&
          active !== document.body &&
          active.matches("input, select, textarea, button");
        if (active !== chestText && !ownsFocus) {
          chestText.focus({ preventScroll: true });
        }
      });

      // Click anywhere in the middle of the page to focus the chest input.
      // .scroll-container is the document-flow block that sits *below* the
      // fixed header, fixed footer, and about-panel in both z-order and DOM
      // ancestry, so clicks that land on any of that chrome never bubble
      // here — no need to filter them out. Clicks on empty space around the
      // shirt (which is inside pointer-events:none .fixed-content) fall
      // through to .scroll-container and trigger focus.
      scrollContainer.addEventListener("click", () => {
        if (document.body.classList.contains("about-open")) return;
        if (!chestText.classList.contains("editable")) return;
        if (document.activeElement === chestText) return;
        chestText.focus({ preventScroll: true });
      });

      handleScroll();
    </script>
  </body>
</html>
