<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkingSh*rt - Custom Tees</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --copy-size: clamp(40px, 10vw, 120px);
        --shirt-size: clamp(360px, 60vw, 760px);
        --chest-y: 32%;
        --chest-font: clamp(18px, 1.8vw, 28px);
      }

      html,
      body {
        background: white;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 20px 40px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.95);
        border-bottom: 1px solid #e0e0e0;
      }

      .logo {
        font-size: 20px;
        font-weight: 600;
        color: #2c2c2c;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 40px;
        z-index: 1000;
        background: white;
        border-top: 1px solid #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }

      footer.visible {
        transform: translateY(0);
      }

      .scroll-container {
        height: 300vh;
        position: relative;
        background: white;
      }

      .fixed-content {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        pointer-events: none;
        background: white;
        overflow: hidden;
      }

      /* Headline text — anchored at viewport center */
      .animated-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center center;
        font-size: var(--copy-size);
        font-weight: 700;
        color: #2c2c2c;
        text-align: center;
        white-space: nowrap;
        will-change: transform, color, opacity;
      }

      .cursor {
        display: inline-block;
        width: 0.06em;
        height: 0.85em;
        background: currentColor;
        margin-left: 0.06em;
        vertical-align: -0.05em;
        animation: blink 1s steps(1) infinite;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      /* Bouncing scroll-down arrow under the cursor */
      .scroll-arrow {
        position: absolute;
        top: calc(50% + 1.2em);
        left: 50%;
        transform: translate(-50%, 0);
        font-size: clamp(20px, 2vw, 28px);
        color: #2c2c2c;
        opacity: 0;
        transition: opacity 0.3s ease;
        animation: arrowBounce 1.6s ease-in-out infinite;
      }

      .scroll-arrow.visible {
        opacity: 1;
      }

      @keyframes arrowBounce {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, 10px);
        }
      }

      /* T-shirt — its chest area lands at viewport center */
      .tshirt-container {
        position: absolute;
        top: 50%;
        left: 50%;
        width: var(--shirt-size);
        transform: translate(-50%, calc(-1 * var(--chest-y) + 100vh));
        will-change: transform;
      }

      .tshirt-wrapper {
        position: relative;
        width: 100%;
      }

      .tshirt-image {
        width: 100%;
        height: auto;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      /* Chest text input — sits at chest area of shirt */
      .chest-text-container {
        position: absolute;
        top: var(--chest-y);
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70%;
        text-align: center;
      }

      .chest-text {
        color: white;
        font-size: var(--chest-font);
        font-weight: 700;
        border: none;
        background: transparent;
        text-align: center;
        width: 100%;
        outline: none;
        pointer-events: none;
        caret-color: transparent;
        font-family: inherit;
      }

      .chest-text.editable {
        pointer-events: auto;
        cursor: text;
        caret-color: white;
      }

      .chest-text::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }

      .add-to-cart {
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 600;
        background: #2c2c2c;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .add-to-cart:disabled {
        background: #e0e0e0;
        color: #999;
        cursor: not-allowed;
      }

      .add-to-cart:hover:not(:disabled) {
        background: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">TalkingSh*rt</div>
    </header>

    <footer>
      <button class="add-to-cart" id="addToCart" disabled>Add to cart</button>
    </footer>

    <div class="scroll-container">
      <div class="fixed-content">
        <div class="animated-text" id="animatedText">
          <span class="cursor"></span>
        </div>

        <div class="scroll-arrow" id="scrollArrow">&#x2193;</div>

        <div class="tshirt-container" id="tshirtContainer">
          <div class="tshirt-wrapper">
            <img
              src="black-tee.png"
              alt="Black T-shirt"
              class="tshirt-image"
            />
            <div class="chest-text-container">
              <input
                type="text"
                class="chest-text"
                id="chestText"
                maxlength="20"
                placeholder="Type"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const scrollContainer = document.querySelector(".scroll-container");
      const animatedText = document.getElementById("animatedText");
      const scrollArrow = document.getElementById("scrollArrow");
      const tshirtContainer = document.getElementById("tshirtContainer");
      const chestText = document.getElementById("chestText");
      const footer = document.querySelector("footer");
      const addToCartBtn = document.getElementById("addToCart");

      const FULL_TEXT = "Talk some sh*rt";

      // Scroll phase boundaries (sum to 1)
      const P = {
        idle: 0.04,
        type: 0.32,
        pause: 0.42,
        del: 0.52,
        rise: 0.82,
        edit: 1.0,
      };

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function clamp(v, min, max) {
        return Math.min(Math.max(v, min), max);
      }

      function setHeadline(text) {
        animatedText.innerHTML = text + '<span class="cursor"></span>';
      }

      function showHeadline(visible) {
        animatedText.style.opacity = visible ? "1" : "0";
      }

      function setShirtRise(riseVh) {
        // riseVh: 100 = fully below viewport, 0 = chest at viewport center
        tshirtContainer.style.transform = `translate(-50%, calc(-1 * var(--chest-y) + ${riseVh}vh))`;
      }

      function setHeadlineScale(scale) {
        animatedText.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      function setHeadlineColor(color) {
        animatedText.style.color = color;
      }

      function handleScroll() {
        const scrollTop = window.scrollY;
        const maxScroll = scrollContainer.offsetHeight - window.innerHeight;
        const progress = clamp(scrollTop / maxScroll, 0, 1);

        if (progress < P.idle) {
          // Frame 159 — cursor + bouncing arrow
          setHeadline("");
          showHeadline(true);
          setHeadlineScale(1);
          setHeadlineColor("#2c2c2c");
          scrollArrow.classList.add("visible");
          setShirtRise(100);
          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        scrollArrow.classList.remove("visible");

        if (progress < P.type) {
          // Frames 160-162 — typing out the headline
          const t = (progress - P.idle) / (P.type - P.idle);
          const len = Math.floor(t * (FULL_TEXT.length + 1));
          setHeadline(FULL_TEXT.slice(0, len));
          showHeadline(true);
          setHeadlineScale(1);
          setHeadlineColor("#2c2c2c");
          setShirtRise(100);
          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        if (progress < P.pause) {
          // Brief pause on full headline
          setHeadline(FULL_TEXT);
          showHeadline(true);
          setHeadlineScale(1);
          setHeadlineColor("#2c2c2c");
          setShirtRise(100);
          footer.classList.remove("visible");
          return;
        }

        if (progress < P.del) {
          // Frame 163 (a) — quickly delete back to "T"
          const t = (progress - P.pause) / (P.del - P.pause);
          const startLen = FULL_TEXT.length;
          const endLen = 1;
          const len = Math.round(lerp(startLen, endLen, t));
          setHeadline(FULL_TEXT.slice(0, len));
          showHeadline(true);
          setHeadlineScale(1);
          setHeadlineColor("#2c2c2c");
          setShirtRise(100);
          footer.classList.remove("visible");
          return;
        }

        if (progress < P.rise) {
          // Frames 163 (b) → 164 — shirt rises, headline shrinks + recolors to white
          const t = (progress - P.del) / (P.rise - P.del);

          // Shirt slides up from below
          const rise = lerp(100, 0, t);
          setShirtRise(rise);

          // Headline shrinks from copy size down to chest size
          const computedCopy = parseFloat(
            getComputedStyle(document.documentElement)
              .getPropertyValue("--copy-size") || "80"
          );
          const computedChest = parseFloat(
            getComputedStyle(document.documentElement)
              .getPropertyValue("--chest-font") || "24"
          );
          const finalScale = computedChest / computedCopy;
          const scale = lerp(1, finalScale, t);
          setHeadlineScale(scale);

          // Recolor headline from dark to white as the dark shirt arrives behind it
          const dark = [44, 44, 44];
          const light = [255, 255, 255];
          const colorT = clamp((t - 0.4) / 0.5, 0, 1);
          const c = dark.map((d, i) =>
            Math.round(lerp(d, light[i], colorT))
          );
          setHeadlineColor(`rgb(${c[0]}, ${c[1]}, ${c[2]})`);

          // Show only "T" until late, then fade headline as input takes over
          setHeadline("T");
          showHeadline(t < 0.95);

          chestText.classList.remove("editable");
          footer.classList.remove("visible");
          return;
        }

        // Frame 164/165/166 — editable
        setShirtRise(0);
        showHeadline(false);
        chestText.classList.add("editable");
        if (document.activeElement !== chestText) {
          chestText.focus({ preventScroll: true });
        }
        if (chestText.value.trim().length > 0) {
          footer.classList.add("visible");
        }
      }

      chestText.addEventListener("input", () => {
        const hasText = chestText.value.trim().length > 0;
        addToCartBtn.disabled = !hasText;
        if (hasText) {
          footer.classList.add("visible");
        } else {
          footer.classList.remove("visible");
        }
      });

      addToCartBtn.addEventListener("click", () => {
        const text = chestText.value || "(blank)";
        alert(`Added to cart: Black T-shirt with "${text}"`);
      });

      window.addEventListener("scroll", handleScroll, { passive: true });
      window.addEventListener("resize", handleScroll);
      handleScroll();
    </script>
  </body>
</html>
