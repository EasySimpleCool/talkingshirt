# name-map.yaml — Figma component / variable names → code names.
# Only the five Figma components plus page-only chrome documented in docs/components.md.

aliases:
  # Figma component name → HTML class / template name
  "IconText": icon-text
  "Button":   button
  "Header":   header
  "Footer":   footer
  "Post":     post

  # Figma variable name → CSS custom property (without --)
  "theme/fg":                  theme-fg
  "theme/fg-alt":              theme-fg-alt
  "theme/faint":               theme-faint
  "theme/faint-alt":           theme-faint-alt
  "theme/bg":                  theme-bg
  "text/medium/font-size":     text-medium-font-size
  "text/medium/font-weight":   text-medium-font-weight
  "text/small/font-size":      text-small-font-size
  "text/small/font-weight":    text-small-font-weight
  "comp/button/fg":            comp-button-fg
  "comp/button/bg-default":    comp-button-bg-default
  "comp/button/bg-hover":      comp-button-bg-hover
  "comp/button/h-pad":         comp-button-h-pad
  "comp/button/v-pad":         comp-button-v-pad
  "comp/button/b-rad":         comp-button-b-rad
  "comp/button/min-h":         comp-button-min-h
  "comp/container/max-w":      comp-container-max-w
  "comp/section/md/h-pad":     comp-section-md-h-pad
  "comp/stack/2xs":            comp-stack-2xs
  "comp/post/gap":             comp-post-gap
